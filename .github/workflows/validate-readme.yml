name: Validate README

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Regenerate README files
        run: python3 scripts/build_readme.py

      - name: Ensure generated files are committed
        run: git diff --exit-code -- README.md README-zh.md
